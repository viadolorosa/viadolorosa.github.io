<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тестовая страница</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        h1 { color: #333; font-size: 24px; margin-bottom: 20px; }
        .phone-box {
            background: #eef2ff;
            padding: 15px;
            border-radius: 8px;
            margin: 10px 0;
            border: 1px solid #d1d5db;
        }
        .label { font-size: 14px; color: #666; margin-bottom: 5px; display: block; }
        .phone-number {
            font-size: 20px;
            font-weight: bold;
            color: #2563eb;
            text-decoration: none;
        }
    </style>
</head>
<body>

<div class="card">
    <h1>Наши контакты</h1>
    
    <div class="phone-box">
        <span class="label">Номер для связи</span>
        <a href="tel:+74951112233" class="phone-number" id="phone_main">+7 (495) 111-22-33</a>
    </div>

</div>

<script></script>

</body>
</html>
